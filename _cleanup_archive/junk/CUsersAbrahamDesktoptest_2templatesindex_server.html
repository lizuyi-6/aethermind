<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超智引擎 - 智能体助手</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpg') }}?v=8">
    <link rel="shortcut icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpg') }}?v=8">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.jpg') }}?v=8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20250104">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>新对话</span>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="chat-history" id="chatHistory">
                    <!-- 历史对话列表将在这里动态生成 -->
                </div>

                <!-- RAG知识库来源 -->
                <div class="rag-sources" id="ragSources" style="display: none;">
                    <div class="rag-sources-header">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 8px;">
                            <path d="M8 2L2 4V11C2 11.5523 2.44772 12 3 12H13C13.5523 12 14 11.5523 14 11V4L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M6 8H10M6 10H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>知识库来源</span>
                        <button class="rag-sources-close" id="ragSourcesClose" style="margin-left: auto; background: none; border: none; color: #666; cursor: pointer; font-size: 18px;">&times;</button>
                    </div>
                    <div class="rag-sources-list" id="ragSourcesList">
                        <!-- RAG源文档列表将在这里动态生成 -->
                    </div>
                    <!-- RAG管理入口已隐藏，仅保留管理界面 -->
                    <!-- <div class="rag-admin-link">
                        <a href="/rag" target="_blank" style="color: #667eea; text-decoration: none; font-size: 12px;">
                            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right: 4px;">
                                <path d="M6 2L10 4V8C10 8.55228 9.55228 9 9 9H3C2.44772 9 2 8.55228 2 8V4L6 2Z" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                            管理知识库
                        </a>
                    </div> -->
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="clearHistoryBtn" class="footer-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 4H14M6 8V12M10 8V12M4 4V13C4 13.5523 4.44772 14 5 14H11C11.5523 14 12 13.5523 12 13V4M6 2V4M10 2V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>清空历史</span>
                </button>
            </div>
        </div>
        
        <!-- 侧边栏切换按钮 -->
        <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <button class="menu-btn" id="menuBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <h1 class="app-title">超智引擎</h1>
                <div class="top-bar-actions" style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
                    <a href="tel:18031609069" style="color: #667eea; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 4px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                        180-3160-9069
                    </a>
                    <a href="/admin" style="color: #667eea; text-decoration: none; font-size: 14px;">管理</a>
                    <!-- RAG入口已隐藏，仅保留管理界面 -->
                    <!-- <a href="/rag" target="_blank" style="color: #28a745; text-decoration: none; font-size: 14px;">📚 RAG</a> -->
                </div>
            </div>
            
            <!-- 验证码输入模态框 -->
            <div class="modal-overlay" id="verifyCodeModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
                <div class="modal-content" style="background: white; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin: 0; font-size: 20px;">输入验证码</h2>
                        <button class="modal-close" onclick="hideVerifyCodeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">&times;</button>
                    </div>
                    <div class="modal-body">
                        <p style="color: #666; margin-bottom: 16px;">请输入您的验证码以获得使用次数</p>
                        <input type="text" id="verifyCodeInput" class="verify-code-input" placeholder="XXXXXX-XXXXXX-XXXXXX-XXXXXX" maxlength="27" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-family: monospace; margin-bottom: 12px;">
                        <div class="modal-error" id="verifyCodeError" style="display: none; color: #dc3545; font-size: 14px; margin-bottom: 12px;"></div>
                        <button class="modal-submit-btn" onclick="submitVerifyCode()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600;">验证</button>
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0; text-align: center;">
                            <p style="color: #666; font-size: 13px; margin-bottom: 8px;">如需购买兑换码，请联系：</p>
                            <a href="tel:18031609069" style="display: inline-flex; align-items: center; gap: 6px; color: #667eea; text-decoration: none; font-size: 15px; font-weight: 600; padding: 8px 16px; background: #f7f8fc; border-radius: 6px; transition: all 0.3s ease;" onmouseover="this.style.background='#e8ebf5'" onmouseout="this.style.background='#f7f8fc'">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                                180-3160-9069
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 聊天区域 -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h2>欢迎使用超智引擎</h2>
                    <p>我是您的专业智能体助手，可以协助您：</p>
                    <div class="welcome-suggestions">
                        <button class="suggestion-btn">撰写可行性研究报告</button>
                        <button class="suggestion-btn">申报政策项目</button>
                        <button class="suggestion-btn">分析行业数据</button>
                        <button class="suggestion-btn">解读政策细则</button>
                    </div>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <button class="attach-btn" id="attachBtn" title="上传文件">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M18 9V17C18 17.5304 17.7893 18.0391 17.4142 18.4142C17.0391 18.7893 16.5304 19 16 19H4C3.46957 19 2.96086 18.7893 2.58579 18.4142C2.21071 18.0391 2 17.5304 2 17V9M14 5L10 1M10 1L6 5M10 1V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <textarea 
                            id="messageInput" 
                            placeholder="输入消息..."
                            rows="1"
                        ></textarea>
                        <button id="sendBtn" class="send-btn" title="发送 (Enter)" disabled>
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M18 2L9 11M18 2L12 18L9 11M18 2L2 8L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <label class="checkbox-label">
                            <input type="checkbox" id="streamMode" checked>
                            <span>流式输出</span>
                        </label>
                        <div class="token-info" id="tokenInfo" style="display: none;">
                            <span class="token-label">Token使用:</span>
                            <span class="token-value" id="tokenValue">0</span>
                        </div>
                        <span class="status-indicator" id="statusIndicator">就绪</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 文件上传模态框 -->
    <div id="fileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传文件</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p>文件: <span id="selectedFileName"></span></p>
                <textarea 
                    id="fileQueryInput" 
                    placeholder="可选：输入您想对文件提出的问题..."
                    rows="3"
                ></textarea>
            </div>
            <div class="modal-footer">
                <button id="cancelFileBtn" class="btn-secondary">取消</button>
                <button id="confirmFileBtn" class="btn-primary">上传并分析</button>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.doc,.txt,.md,.xlsx,.xls,.csv,.json,.py,.js,.java,.cpp,.c,.html,.css">
    
    <!-- PDF转换进度条样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='pdf-progress.css') }}">
    <!-- Mermaid 图表库 - 本地托管，避免CORS问题 -->
    <script src="{{ url_for('static', filename='mermaid.min.js') }}?v=20250104"></script>
    <script src="{{ url_for('static', filename='report-display.js') }}?v=20250104"></script>
    <script src="{{ url_for('static', filename='app.js') }}?v=20250104"></script>
    <script>
        // 初始化 Mermaid
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ 
                startOnLoad: false,
                theme: 'default',
                flowchart: { useMaxWidth: true, htmlLabels: true }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - AetherMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 全局主题加载器 -->
    <script src="/static/theme-loader.js?v=4"></script>

    <link href="https://fonts.googleapis.cn/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <style>
        :root {
            --ds-bg: 245 240 232;
            --ds-bg-2: 250 248 243;
            --ds-bg-3: 255 255 255;
            --ds-text: 45 74 62;
            --ds-text-muted: 122 139 126;
            --ds-accent: 45 74 62;
            --ds-accent-2: 31 58 48;
            --ds-scrollbar: 216 208 196;
        }

        body {
            font-family: 'Instrument Serif', 'Noto Serif SC', serif;
            background: #F5F0E8;
            color: #2D4A3E;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.035;
            pointer-events: none;
            z-index: 9999;
        }

        .glass-card {
            background: #FAF8F3;
            border: 1px solid #D8D0C4;
            border-radius: 2px;
        }

        .input-modern {
            background: #FAF8F3;
            border: 1px solid #D8D0C4;
            color: #2D4A3E;
            border-radius: 2px;
            font-family: 'Space Mono', monospace;
            transition: border-color 0.2s;
        }

        .input-modern:focus {
            outline: none;
            border-color: #2D4A3E;
            box-shadow: none;
        }

        .btn-primary {
            background: #2D4A3E;
            border: none;
            color: #F5F0E8;
            border-radius: 2px;
            font-family: 'Space Mono', monospace;
            transition: all 0.15s;
        }

        .btn-primary:hover {
            background: #1F3A30;
            transform: translateY(-1px);
            box-shadow: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F5F0E8;
        }
        ::-webkit-scrollbar-thumb {
            background: #D8D0C4;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2D4A3E;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#2D4A3E] mb-4">
                <img src="/static/logo.jpg" class="w-10 h-10 rounded-lg" alt="AetherMind Logo">
            </div>
            <h1 class="text-3xl font-semibold mb-2" style="font-family: 'Space Mono', monospace; color: #2D4A3E;">AetherMind</h1>
            <p class="text-sm" style="color: #7A8B7E;">管理控制台</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-8">
            <div class="text-center mb-8">
                <h2 class="text-xl font-semibold mb-2" style="font-family: 'Space Mono', monospace; color: #2D4A3E;">管理员登录</h2>
                <p class="text-sm" style="color: #7A8B7E;">请输入您的凭据以访问管理面板</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-6 p-4 border rounded-lg" style="background: #FDF2F2; border-color: #E5C5C5;">
                <p class="text-sm flex items-center gap-2" style="color: #B85C5C;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <span id="errorText"></span>
                </p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium mb-2" style="font-family: 'Space Mono', monospace; color: #2D4A3E;">
                        用户名
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #7A8B7E;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <input type="text" id="username" name="username" required autocomplete="username"
                            class="input-modern w-full pl-10 pr-4 py-3 text-sm"
                            placeholder="输入用户名">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium mb-2" style="font-family: 'Space Mono', monospace; color: #2D4A3E;">
                        密码
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #7A8B7E;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            class="input-modern w-full pl-10 pr-4 py-3 text-sm"
                            placeholder="输入密码">
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="btn-primary w-full py-3 text-sm font-semibold flex items-center justify-center gap-2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                    <span id="loginBtnText">登录</span>
                </button>
            </form>

            <!-- Back Link -->
            <div class="mt-6 text-center">
                <a href="/" class="text-sm transition-colors inline-flex items-center gap-1" style="color: #7A8B7E;" onmouseover="this.style.color='#2D4A3E'" onmouseout="this.style.color='#7A8B7E'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    返回首页
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-xs" style="color: #7A8B7E;">© 2024 AetherMind Platform. All rights reserved.</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.textContent = '登录中...';
            hideError();

            try {
                const response = await fetch('/api/v1/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 成功登录，跳转到dashboard
                    window.location.href = '/admin/dashboard';
                } else {
                    showError(data.error || '登录失败');
                    loginBtn.disabled = false;
                    loginBtnText.textContent = '登录';
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                loginBtn.disabled = false;
                loginBtnText.textContent = '登录';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // 支持Enter键登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
    <script src="/static/theme-workshop.js?v=4"></script>
</body>
</html>

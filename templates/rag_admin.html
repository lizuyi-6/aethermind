<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG知识库控制台 - 超智引擎</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_unified.css') }}?v=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='cosmic-theme.css') }}?v=1">
    <style>
        :root {
            --bg: var(--cosmic-void);
            --surface: var(--glass-bg-light);
            --surface-alt: var(--glass-bg-dark);
            --text: var(--text-primary);
            --muted: var(--text-secondary);
            --line: var(--glass-border);
            --brand: var(--nebula-purple);
            --brand-2: var(--nebula-pink);
            --accent: var(--cosmic-cyan);
            --danger: var(--black-hole-red);
            --warn: var(--supernova-orange);
            --ok: var(--comet-green);
            --radius: 14px;
            --shadow: var(--glass-shadow);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Sans SC", "Source Han Sans SC", "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                var(--cosmic-bg);
            min-height: 100vh;
            padding: 18px;
        }

        .shell {
            max-width: 1240px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            background: var(--aurora-gradient);
            color: #f7fffb;
            padding: 24px 26px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .hero h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0.3px;
        }

        .hero p {
            margin: 8px 0 0;
            opacity: 0.92;
            font-size: 14px;
        }

        .hero-meta {
            display: grid;
            gap: 6px;
            font-size: 13px;
            opacity: 0.95;
            text-align: right;
        }

        .layout {
            display: grid;
            grid-template-columns: 236px 1fr;
            min-height: 680px;
        }

        .nav {
            background: var(--surface-alt);
            border-right: 1px solid var(--line);
            padding: 16px;
            display: grid;
            gap: 10px;
            align-content: start;
        }

        .tab-btn {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 12px;
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .tab-btn:hover {
            transform: translateY(-1px);
            border-color: #b8cbbb;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #d9efe5 0%, #d8ecf0 100%);
            border-color: #98baa9;
        }

        .main {
            padding: 22px;
        }

        .panel {
            display: none;
            animation: fadeIn 0.18s ease;
        }

        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .panel-head h2 {
            margin: 0;
            font-size: 22px;
        }

        .panel-head p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: linear-gradient(160deg, #ffffff 0%, #f4faf6 100%);
            padding: 14px;
        }

        .stat .k {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat .v {
            font-size: 26px;
            font-weight: 700;
            color: #0f5f77;
            line-height: 1.1;
            word-break: break-all;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text);
            background: #fff;
        }

        textarea { min-height: 146px; resize: vertical; }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #84bca5;
            box-shadow: 0 0 0 3px rgba(21, 127, 95, 0.12);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .btn {
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 16px;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(100deg, var(--brand) 0%, var(--brand-2) 100%);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }

        .btn-ghost {
            border-color: var(--line);
            background: #fff;
            color: var(--text);
        }

        .btn-ghost:hover:not(:disabled) { border-color: #aebfb2; }

        .btn-danger {
            background: #fff5f5;
            border-color: #efc6c2;
            color: var(--danger);
        }

        .btn-danger:hover:not(:disabled) {
            background: #ffe9e7;
        }

        .hint {
            border-radius: 10px;
            border: 1px solid #f2d7b3;
            background: #fff8ef;
            color: #6c4a1f;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .result-wrap { margin-top: 14px; }

        .result-count {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: auto;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
            font-size: 13px;
        }

        th {
            font-size: 12px;
            color: var(--muted);
            background: #f8fcf8;
            text-transform: uppercase;
            letter-spacing: 0.45px;
        }

        tr:last-child td { border-bottom: none; }

        .score-pill {
            display: inline-block;
            min-width: 58px;
            text-align: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
        }

        .score-hi { background: #dff5e5; color: #116735; }
        .score-md { background: #fff0db; color: #8b4b00; }
        .score-lo { background: #ffe2df; color: #8f1f16; }

        .progress {
            margin-top: 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            height: 30px;
            overflow: hidden;
            background: #f2f6f2;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(100deg, #157f5f 0%, #0f5f77 100%);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }

        .toast-box {
            position: fixed;
            right: 16px;
            top: 16px;
            z-index: 1000;
            display: grid;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            min-width: 260px;
            max-width: 420px;
            border-radius: 10px;
            border: 1px solid;
            padding: 10px 12px;
            font-size: 13px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            background: #fff;
            animation: slideIn 0.18s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast.success { border-color: #a9dfbd; color: #145a33; }
        .toast.error { border-color: #efb8b1; color: #7f1d1d; }
        .toast.info { border-color: #b8d8ef; color: #124a71; }

        .loading-dot {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
            .nav {
                border-right: none;
                border-bottom: 1px solid var(--line);
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 640px) {
            body { padding: 10px; }
            .hero h1 { font-size: 24px; }
            .main { padding: 14px; }
            .row { grid-template-columns: 1fr; }
            .stat-grid { grid-template-columns: 1fr; }
            .nav { grid-template-columns: 1fr; }
            .actions .btn { width: 100%; }
            .hero-meta { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="hero">
            <div>
                <h1>RAG 知识库控制台</h1>
                <p>用于知识库增量维护、检索验证与备份操作</p>
            </div>
            <div class="hero-meta">
                <div>模式: 管理员控制台</div>
                <div>目标: 降低幻觉，提升检索命中率</div>
            </div>
        </header>

        <div class="layout">
            <aside class="nav" id="tabNav">
                <button type="button" class="tab-btn active" data-tab="stats">统计概览</button>
                <button type="button" class="tab-btn" data-tab="add">添加文档</button>
                <button type="button" class="tab-btn" data-tab="search">检索测试</button>
                <button type="button" class="tab-btn" data-tab="manage">维护操作</button>
            </aside>

            <main class="main">
                <section id="stats" class="panel active">
                    <div class="panel-head">
                        <div>
                            <h2>统计概览</h2>
                            <p>快速查看知识库规模、模型与状态</p>
                        </div>
                        <button class="btn btn-primary" id="refreshStatsBtn" type="button">刷新统计</button>
                    </div>

                    <div class="stat-grid">
                        <div class="stat">
                            <div class="k">总文档数</div>
                            <div class="v" id="totalDocs">-</div>
                        </div>
                        <div class="stat">
                            <div class="k">向量维度</div>
                            <div class="v" id="dimension">-</div>
                        </div>
                        <div class="stat">
                            <div class="k">嵌入模型</div>
                            <div class="v" id="model" style="font-size: 16px;">-</div>
                        </div>
                        <div class="stat">
                            <div class="k">数据库状态</div>
                            <div class="v" id="status" style="font-size: 16px;">-</div>
                        </div>
                    </div>
                </section>

                <section id="add" class="panel">
                    <div class="panel-head">
                        <div>
                            <h2>添加文档</h2>
                            <p>支持手工录入、URL抓取、目录批量导入</p>
                        </div>
                    </div>

                    <div class="row">
                        <div>
                            <div class="field">
                                <label for="docTitle">文档标题</label>
                                <input type="text" id="docTitle" placeholder="例如：2026产业政策梳理">
                            </div>
                        </div>
                        <div>
                            <div class="field">
                                <label for="docSource">文档来源</label>
                                <input type="text" id="docSource" placeholder="URL / 文件路径 / 手工录入">
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="docContent">文档内容</label>
                        <textarea id="docContent" placeholder="请粘贴完整文档内容"></textarea>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label for="docCategory">分类</label>
                            <select id="docCategory">
                                <option value="general">通用</option>
                                <option value="policy">政策文件</option>
                                <option value="industry">行业报告</option>
                                <option value="dialog_history">对话历史</option>
                                <option value="report">可研报告</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn btn-primary" id="addDocBtn"><span id="addBtnText">添加文档</span></button>
                        <button type="button" class="btn btn-ghost" id="addUrlBtn">从 URL 添加</button>
                        <button type="button" class="btn btn-ghost" id="addDirBtn">目录批量导入</button>
                    </div>
                </section>

                <section id="search" class="panel">
                    <div class="panel-head">
                        <div>
                            <h2>检索测试</h2>
                            <p>验证召回效果与相关度分布</p>
                        </div>
                    </div>

                    <div class="field">
                        <label for="searchQuery">查询问题</label>
                        <textarea id="searchQuery" placeholder="输入你要验证的问题，例如：某产业补贴申报条件是什么？"></textarea>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label for="searchStrategy">检索策略</label>
                            <select id="searchStrategy">
                                <option value="hybrid">混合检索（推荐）</option>
                                <option value="vector">向量检索</option>
                                <option value="keyword">关键词检索</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="searchCategory">分类过滤（可选）</label>
                            <select id="searchCategory">
                                <option value="">全部</option>
                                <option value="policy">政策文件</option>
                                <option value="industry">行业报告</option>
                                <option value="dialog_history">对话历史</option>
                                <option value="report">可研报告</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn btn-primary" id="searchBtn">开始检索</button>
                    </div>

                    <div id="searchResults" class="result-wrap"></div>
                </section>

                <section id="manage" class="panel">
                    <div class="panel-head">
                        <div>
                            <h2>维护操作</h2>
                            <p>高风险操作请谨慎执行</p>
                        </div>
                    </div>

                    <div class="hint">
                        注意: “清空知识库”不可撤销，请先执行导出备份。
                    </div>

                    <div class="actions">
                        <button type="button" class="btn btn-danger" id="clearBtn">清空知识库</button>
                        <button type="button" class="btn btn-ghost" id="exportBtn">导出知识库</button>
                        <button type="button" class="btn btn-ghost" id="refreshManageBtn">刷新统计</button>
                    </div>

                    <div id="manageProgress"></div>
                </section>
            </main>
        </div>
    </div>

    <div id="toastBox" class="toast-box"></div>

    <script>
        const state = {
            activeTab: 'stats'
        };

        const $ = (id) => document.getElementById(id);

        function switchTab(tabId) {
            state.activeTab = tabId;
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            const panel = $(tabId);
            const nav = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
            if (panel) panel.classList.add('active');
            if (nav) nav.classList.add('active');

            if (tabId === 'stats') {
                loadStats();
            }
        }

        function setButtonBusy(btn, busy, text, loadingText) {
            if (!btn) return;
            btn.disabled = busy;
            if (!text) return;
            text.innerHTML = busy ? `<span class="loading-dot"></span>${loadingText}` : text.dataset.defaultText;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showToast(type, message) {
            const box = $('toastBox');
            const item = document.createElement('div');
            item.className = `toast ${type}`;
            item.textContent = message;
            box.appendChild(item);
            setTimeout(() => {
                if (item.parentNode) item.parentNode.removeChild(item);
            }, 4200);
        }

        function scoreClass(score) {
            if (score >= 0.8) return 'score-hi';
            if (score >= 0.6) return 'score-md';
            return 'score-lo';
        }

        function formatPreview(text, maxLen = 120) {
            const raw = String(text || '').replace(/\s+/g, ' ').trim();
            if (!raw) return '-';
            return raw.length > maxLen ? `${raw.slice(0, maxLen)}...` : raw;
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/rag/stats');
                const data = await response.json();

                if (!data.success) {
                    showToast('error', data.error || '加载统计失败');
                    return;
                }

                $('totalDocs').textContent = data.stats.total_documents || 0;
                $('dimension').textContent = data.stats.embedding_dimension || '-';
                $('model').textContent = data.stats.embedding_model || '-';
                $('status').textContent = data.stats.status || 'unknown';
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
            }
        }

        async function addDocument() {
            const title = $('docTitle').value.trim();
            const content = $('docContent').value.trim();
            const source = $('docSource').value.trim();
            const category = $('docCategory').value;

            if (!title || !content) {
                showToast('error', '请填写标题和内容');
                return;
            }

            const btn = $('addDocBtn');
            const text = $('addBtnText');
            setButtonBusy(btn, true, text, '添加中');

            try {
                const response = await fetch('/api/rag/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        documents: [{ title, content, source }],
                        category
                    })
                });

                const data = await response.json();
                if (!data.success) {
                    showToast('error', data.error || '添加失败');
                    return;
                }

                showToast('success', `成功添加文档，ID: ${data.document_ids.join(', ')}`);
                $('docTitle').value = '';
                $('docContent').value = '';
                $('docSource').value = '';
                loadStats();
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
            } finally {
                setButtonBusy(btn, false, text, '添加中');
            }
        }

        async function searchKnowledge() {
            const query = $('searchQuery').value.trim();
            const strategy = $('searchStrategy').value;
            const category = $('searchCategory').value;
            const resultEl = $('searchResults');

            if (!query) {
                showToast('error', '请输入查询内容');
                return;
            }

            resultEl.innerHTML = '<div class="hint">检索中，请稍候...</div>';

            try {
                const response = await fetch('/api/rag/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, strategy, category })
                });
                const data = await response.json();

                if (!data.success) {
                    showToast('error', data.error || '检索失败');
                    resultEl.innerHTML = '';
                    return;
                }

                displayResults(data.results);
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
                resultEl.innerHTML = '';
            }
        }

        function displayResults(results) {
            const el = $('searchResults');
            if (!Array.isArray(results) || results.length === 0) {
                el.innerHTML = '<div class="hint">未找到相关文档</div>';
                return;
            }

            const rows = results.map((item) => {
                const payload = item.payload || {};
                const score = Number(item.score || 0);
                return `
                    <tr>
                        <td>${escapeHtml(payload.title || 'Untitled')}</td>
                        <td><span class="score-pill ${scoreClass(score)}">${score.toFixed(3)}</span></td>
                        <td>${escapeHtml(payload.category || 'general')}</td>
                        <td>${escapeHtml(payload.source || '-')}</td>
                        <td>${escapeHtml(formatPreview(payload.content || ''))}</td>
                    </tr>
                `;
            }).join('');

            el.innerHTML = `
                <div class="result-count">共 ${results.length} 条结果</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>相似度</th>
                                <th>分类</th>
                                <th>来源</th>
                                <th>内容预览</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        async function clearKnowledgeBase() {
            if (!confirm('确定要清空知识库吗？此操作不可逆。')) return;
            if (!confirm('请再次确认：是否继续清空全部文档？')) return;

            try {
                const response = await fetch('/api/rag/clear', { method: 'POST' });
                const data = await response.json();
                if (!data.success) {
                    showToast('error', data.error || '清空失败');
                    return;
                }
                showToast('success', '知识库已清空');
                loadStats();
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
            }
        }

        async function exportKnowledgeBase() {
            try {
                const response = await fetch('/api/rag/export');
                const data = await response.json();
                if (!data.success) {
                    showToast('error', data.error || '导出失败');
                    return;
                }
                showToast('success', `导出成功: ${data.file}`);
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
            }
        }

        async function addFromUrl() {
            const url = prompt('请输入网页URL:');
            if (!url) return;
            const category = $('docCategory').value;

            try {
                const response = await fetch('/api/rag/add/url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, category })
                });
                const data = await response.json();
                if (!data.success) {
                    showToast('error', data.error || '添加失败');
                    return;
                }
                showToast('success', '成功添加网页内容');
                loadStats();
            } catch (error) {
                showToast('error', `请求失败: ${error.message}`);
            }
        }

        async function addFromDir() {
            const directory = prompt('请输入目录路径:');
            if (!directory) return;
            const category = $('docCategory').value;
            const progressDiv = $('manageProgress');
            progressDiv.innerHTML = '<div class="progress"><div class="progress-bar">处理中...</div></div>';

            try {
                const response = await fetch('/api/rag/add/directory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ directory, category })
                });
                const data = await response.json();
                if (!data.success) {
                    showToast('error', data.error || '添加失败');
                    progressDiv.innerHTML = '';
                    return;
                }
                progressDiv.innerHTML = `<div class="hint">批量导入完成，共 ${data.count} 个文件。</div>`;
                showToast('success', `成功添加 ${data.count} 个文件`);
                loadStats();
            } catch (error) {
                progressDiv.innerHTML = '';
                showToast('error', `请求失败: ${error.message}`);
            }
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            const addText = $('addBtnText');
            if (addText) addText.dataset.defaultText = addText.textContent;

            $('refreshStatsBtn').addEventListener('click', loadStats);
            $('refreshManageBtn').addEventListener('click', loadStats);
            $('addDocBtn').addEventListener('click', addDocument);
            $('addUrlBtn').addEventListener('click', addFromUrl);
            $('addDirBtn').addEventListener('click', addFromDir);
            $('searchBtn').addEventListener('click', searchKnowledge);
            $('clearBtn').addEventListener('click', clearKnowledgeBase);
            $('exportBtn').addEventListener('click', exportKnowledgeBase);
        }

        window.addEventListener('DOMContentLoaded', () => {
            bindEvents();
            loadStats();
        });
    </script>
</body>
</html>

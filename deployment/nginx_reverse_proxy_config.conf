# Nginx 反向代理配置示例
# 用于在不影响现有网站的情况下添加新应用

# 方案1: 使用不同路径（推荐）
# 例如：现有网站 http://example.com
#       新应用   http://example.com/newapp

server {
    listen 80;
    server_name your-domain.com;  # 替换为您的域名或IP

    # 现有网站配置（保持不变）
    location / {
        # 您现有的配置
        # proxy_pass http://localhost:现有端口;
        # 或 root /var/www/html;
    }

    # 新应用配置（添加这个）
    location /newapp {
        proxy_pass http://localhost:5001;  # 新应用的端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# 方案2: 使用不同子域名
# 例如：现有网站 http://www.example.com
#       新应用   http://app.example.com

server {
    listen 80;
    server_name app.your-domain.com;  # 新应用的子域名

    location / {
        proxy_pass http://localhost:5001;  # 新应用的端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# 方案3: 使用不同端口（最简单）
# 直接访问 http://your-ip:5001

